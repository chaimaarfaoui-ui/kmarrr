<!-- ── HTML INCLUDE LOADER ── -->
<script>
  const includes = [
    ['nav-placeholder',       'nav.html'],
    ['hero-placeholder',      'hero.html'],
    ['treatments-placeholder','treatments.html'],
    ['packages-placeholder',  'packages.html'],
    ['editorial-placeholder', 'editorial.html'],
    ['doctors-placeholder',   'doctors.html'],
    ['gallery-placeholder',   'gallery.html'],
    ['reviews-placeholder',   'reviews.html'],
    ['news-placeholder',      'news.html'],
    ['stats-placeholder',     'stats.html'],
    ['footer-placeholder',    'footer.html'],
    ['chat-placeholder',      'chat.html'],
    ['modals-placeholder',    'modals.html'],
  ];

  Promise.all(includes.map(([id, file]) =>
    fetch(file)
      .then(r => r.text())
      .then(html => { document.getElementById(id).outerHTML = html; })
  )).then(() => {
    // Re-init after all HTML is loaded
    if (typeof updateNavAuth === 'function') updateNavAuth();
    document.querySelectorAll('.rev').forEach(el => {
      if (typeof obs !== 'undefined') obs.observe(el);
    });
  });
</script>
